<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nanoflare Gallery App</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">KV + object storage + static assets</p>
        <h1>Upload images and watch the gallery fill itself.</h1>
        <p class="lede">
          The browser UI is served as a static asset, the image bytes live in object
          storage, and the gallery index is stored in KV.
        </p>
      </section>

      <section class="panel">
        <form id="upload-form" class="upload-form">
          <label class="upload-prompt" for="image-input">
            <span>Choose an image</span>
            <small>PNG, JPG, GIF, or WebP all work well here.</small>
          </label>
          <input id="image-input" name="image" type="file" accept="image/*" required />
          <button type="submit">Upload image</button>
        </form>
        <p id="status" class="status">Loading gallery...</p>
      </section>

      <section>
        <div id="gallery" class="gallery"></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
