services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nanoflare
      POSTGRES_USER: nanoflare
      POSTGRES_PASSWORD: nanoflare-development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanoflare -d nanoflare"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nanoflare
      MINIO_ROOT_PASSWORD: nanoflare-development
    ports:
      - "9000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  traefik:
    image: traefik:v3.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --metrics.prometheus=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --providers.http.endpoint=http://host.docker.internal:8080/internal/traefik/config
      - --providers.http.pollInterval=1s
      - --providers.http.headers.Authorization=Bearer ${NANOFLARE_TRAEFIK_TOKEN:-nanoflare-development}
    ports:
      - "8088:80"
      - "8443:443"
      - "8089:8080"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - traefik

volumes:
  postgres-data:
  minio-data:
  prometheus-data:
