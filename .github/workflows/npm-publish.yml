name: npm Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: |
          npm install -g npm@^11.15.0
          node --version
          npm --version

      - name: Build CLI platform binaries
        run: ./scripts/build-npm-cli-binaries.sh

      - name: Publish CLI platform packages
        run: |
          set -eu
          publish_package() {
            package_dir=$1
            name=$(node -p "require('./${package_dir}/package.json').name")
            version=$(node -p "require('./${package_dir}/package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} is already published; skipping"
              return
            fi
            npm publish "$package_dir" --access public
          }

          for package_dir in packages/cli/npm/*; do
            publish_package "$package_dir"
          done

      - name: Publish CLI package
        run: |
          set -eu
          name=$(node -p "require('./packages/cli/package.json').name")
          version=$(node -p "require('./packages/cli/package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} is already published; skipping"
          else
            npm publish packages/cli --access public
          fi

      - name: Install workers-types dependencies
        working-directory: packages/workers-types
        run: npm ci

      - name: Validate workers-types
        working-directory: packages/workers-types
        run: npm test

      - name: Publish workers-types package
        run: |
          set -eu
          name=$(node -p "require('./packages/workers-types/package.json').name")
          version=$(node -p "require('./packages/workers-types/package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} is already published; skipping"
          else
            npm publish packages/workers-types --access public
          fi
