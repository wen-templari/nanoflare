services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform-development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: platform
      MINIO_ROOT_PASSWORD: platform-development
    ports:
      - "9000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  traefik:
    image: traefik:v3.4
    command:
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - "8088:80"
      - "8443:443"
      - "8089:8080"
    volumes:
      - ./var/generated:/etc/traefik/dynamic:ro

volumes:
  postgres-data:
  minio-data:
